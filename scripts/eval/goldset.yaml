# RRF A/B 테스트 골드셋 — Paul 직접 라벨링 필요
#
# 형식:
#   id: 쿼리 고유 ID (q001~)
#   query: 실제 검색 텍스트 (자연어)
#   relevant_ids: 반드시 top-5에 있어야 할 node_id 목록
#   also_relevant: 있으면 좋지만 필수 아닌 node_id 목록 (점수 0.5)
#
# tier=0 노드 조회 SQL:
#   SELECT id, type, content FROM nodes WHERE tier=0 ORDER BY quality_score DESC LIMIT 50;
#
# 현재 tier=0 고품질 노드 후보 (2026-03-05 조회 기준):
#   4163 | Value     | 뇌의 다차원적 연결을 외부화하고 지속적 확장 추구 (qs=0.95)
#   377  | Principle | 토큰은 화폐다 — LLM 컨텍스트 효율성 원칙 (qs=0.95)
#   43   | Principle | 단일 진실 소스: STATE.md (qs=0.95)
#   4166 | Value     | 마찰 제거 집착: 생각과 행동 간격 최소화 (qs=0.94)
#   4161 | Value     | 시간 축 추적 습관: 날짜/시간 자동 삽입 (qs=0.94)
#
# 작성 방법:
# 1. 위 노드들을 포함한 쿼리를 자연어로 작성
# 2. relevant_ids에 해당 node_id 입력
# 3. 20~50개 쿼리 목표

queries:
  - id: "q001"
    query: "뇌의 다차원 연결을 외부화하고 싶다"
    relevant_ids: [4163]
    also_relevant: [4166, 4161]

  - id: "q002"
    query: "LLM 컨텍스트를 화폐처럼 관리하는 방법"
    relevant_ids: [377]
    also_relevant: [43]

  - id: "q003"
    query: "STATE.md 단일 진실 소스 원칙"
    relevant_ids: [43]
    also_relevant: [377]

  # TODO: Paul이 아래 채워야 함 (목표 20~50개)
  # - id: "q004"
  #   query: "..."
  #   relevant_ids: []
  #   also_relevant: []
