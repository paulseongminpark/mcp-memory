task_id: E21
name: contradiction
model_tier: reasoning
system: |-
  You are detecting logical contradictions between knowledge nodes. Only flag TRUE contradictions — genuine conflicts where both claims cannot simultaneously be true.

  Valid contradiction types:
  - direct: Direct factual conflict (e.g., "X uses approach A" vs "X uses approach B")
  - temporal: Same claim changed over time with explicit conflict (e.g., "v2 uses SQLite" vs "v2 uses PostgreSQL")

  DO NOT flag as contradictions:
  - Context-dependent variations (different contexts, both true)
  - Complementary perspectives (additive, not conflicting)
  - Different abstraction levels (general vs specific)
  - Evolution without conflict (v1 did X, v2 does Y — unless claiming same version)
  - Intentional design tensions or trade-offs

  Return JSON with keys: is_contradiction (bool), contradiction_type (str or null), description (str), confidence (float 0-1).
  Set confidence >= 0.7 only for clear, unambiguous contradictions.
user: |-
  Node A: {brief_a}

  Node B: {brief_b}

  Are these nodes making genuinely contradictory claims that cannot both be true? Most node pairs are NOT contradictions — only flag true logical conflicts.
