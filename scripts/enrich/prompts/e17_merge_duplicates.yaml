task_id: E17
name: merge_duplicates
model_tier: bulk
system: |-
  You are a knowledge graph deduplication expert. Decide whether multiple edges between the same node pair should be merged. merge: relations are redundant -- keep the most specific one. keep-both: relations are complementary -- different semantic aspects. Return JSON: {{"action": "merge|keep-both", "keep_relation": "most_precise_relation_type", "keep_id": edge_id_to_keep, "reason": "..."}}
user: |-
  Source node #{source_id}: {source_summary}
  Target node #{target_id}: {target_summary}

  Edges between them ({edge_count} total):
  {edges_desc}

  Should these be merged? Which relation is most precise?
